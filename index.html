<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Orb Puzzle - Dark Theme</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #121212 0%, #1e1e2f 100%);
      color: #e0e0e0;
    }

    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .level-text {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      margin: 0;
    }

    .flavor-text {
      font-size: 1rem;
      color: #aaaaaa;
      margin-top: 5px;
    }

    .guess-display {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 5px;
      color: #3498db;
      height: 60px;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
    }

    .game-board {
      position: relative;
      width: 400px;
      height: 400px;
      background: #1a1a24;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
      border: 1px solid #2a2a35;
    }

    #wireLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes float {
      0% { transform: translate(0px, 0px); }
      33% { transform: translate(4px, -8px); }
      66% { transform: translate(-4px, -4px); }
      100% { transform: translate(0px, 0px); }
    }

    .dot {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: #3498db;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.8), inset 0 -3px 0 rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      user-select: none;
      z-index: 2;
      animation: float 4s ease-in-out infinite;
    }

    .dot:nth-child(even) {
      animation-duration: 5s;
      animation-delay: 0.5s;
    }

    .dot:nth-child(odd) {
      animation-duration: 3.5s;
      animation-delay: 1s;
    }

    .dot.selected {
      background-color: #2ecc71;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.9);
      animation: none;
      transform: scale(0.9);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="game-header">
    <h1 class="level-text" id="levelDisplay">Level 1</h1>
    <p class="flavor-text" id="flavorDisplay">Spell the hidden word.</p>
  </div>

  <div class="guess-display" id="guessDisplay"></div> 

  <div class="game-board" id="gameBoard">
    <svg id="wireLayer"></svg>
  </div>

  <script>
    let currentLevel = 1;
    const maxLevels = 4;
    let targetWord = "";
    let currentGuess = "";
    let selectedOrbs = [];

    const wordBank = {
      1: ["SUN", "ART", "FOX", "JOY"],
      2: ["PLAY", "EPIC", "HERO", "STAR"],
      3: ["MAGIC", "LOGIC", "BRAIN", "POWER"],
      4: ["PUZZLE", "ACTION", "WIZARD", "GAMING"]
    };

    const gameBoard = document.getElementById('gameBoard');
    const wireLayer = document.getElementById('wireLayer');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');

    function startLevel(level) {
      currentGuess = "";
      guessDisplay.textContent = "";
      selectedOrbs = [];
      
      const dots = document.querySelectorAll('.dot');
      dots.forEach(dot => dot.remove());
      
      while (wireLayer.firstChild) {
        wireLayer.removeChild(wireLayer.firstChild);
      }
      
      const wordOptions = wordBank[level];
      targetWord = wordOptions[Math.floor(Math.random() * wordOptions.length)];
      
      levelDisplay.textContent = `Level ${level}`;
      flavorDisplay.textContent = `Spell the ${targetWord.length}-letter word!`;

      const scrambledLetters = targetWord.split('').sort(() => 0.5 - Math.random());

      scrambledLetters.forEach(letter => {
        createOrb(letter);
      });
    }

    function createOrb(letter) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      dot.textContent = letter;
      
      const x = Math.random() * 310 + 20; 
      const y = Math.random() * 310 + 20;
      
      dot.style.left = `${x}px`;
      dot.style.top = `${y}px`;
      
      const centerX = x + 25;
      const centerY = y + 25;
      
      dot.addEventListener('click', () => {
        dot.classList.add('selected');
        currentGuess += letter;
        guessDisplay.textContent = currentGuess;
        
        selectedOrbs.push({ x: centerX, y: centerY });
        drawWires();
        
        checkWinCondition();
      });
      
      gameBoard.appendChild(dot);
    }

    function drawWires() {
      while (wireLayer.firstChild) {
        wireLayer.removeChild(wireLayer.firstChild);
      }

      for (let i = 0; i < selectedOrbs.length - 1; i++) {
        const start = selectedOrbs[i];
        const end = selectedOrbs[i + 1];
        
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', start.x);
        line.setAttribute('y1', start.y);
        line.setAttribute('x2', end.x);
        line.setAttribute('y2', end.y);
        line.setAttribute('stroke', '#2ecc71');
        line.setAttribute('stroke-width', '4');
        line.setAttribute('stroke-linecap', 'round');
        
        wireLayer.appendChild(line);
      }
    }

    function checkWinCondition() {
      if (currentGuess.length === targetWord.length) {
        if (currentGuess === targetWord) {
          setTimeout(() => {
            if (currentLevel < maxLevels) {
              currentLevel++;
              startLevel(currentLevel);
            } else {
              levelDisplay.textContent = "You Win!";
              flavorDisplay.textContent = "You are a word master.";
              guessDisplay.textContent = "🎉🎉🎉";
              
              const dots = document.querySelectorAll('.dot');
              dots.forEach(dot => dot.remove());
              while (wireLayer.firstChild) {
                wireLayer.removeChild(wireLayer.firstChild);
              }
            }
          }, 500); 
        } else {
          guessDisplay.textContent = "TRY AGAIN";
          guessDisplay.style.color = "#e74c3c"; 
          
          setTimeout(() => {
            guessDisplay.style.color = "#3498db"; 
            startLevel(currentLevel); 
          }, 1000);
        }
      }
    }

    startLevel(currentLevel);
  </script>
</body>
</html>
