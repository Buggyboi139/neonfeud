<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Word Orb Puzzle</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #121212 0%, #1e1e2f 100%);
      color: #e0e0e0;
      overflow: hidden;
      touch-action: none;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .screen.active {
      display: flex;
    }

    .title {
      font-size: 3rem;
      font-weight: bold;
      color: #3498db;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
      text-align: center;
    }

    .instructions {
      font-size: 1.1rem;
      color: #aaaaaa;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
    }

    .btn:hover {
      background: #2980b9;
      transform: scale(1.05);
    }

    .level-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      width: 100%;
      max-width: 300px;
    }

    .level-btn {
      background: #1a1a24;
      color: #e0e0e0;
      border: 2px solid #3498db;
      padding: 15px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .level-btn:not(:disabled):hover {
      background: #3498db;
      color: white;
      transform: scale(1.02);
    }

    .level-btn:disabled {
      border-color: #2a2a35;
      color: #555;
      cursor: not-allowed;
      background: #121212;
    }

    .game-header {
      text-align: center;
      margin-bottom: 10px;
      position: relative;
      width: 100%;
      max-width: 400px;
    }

    .level-text {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      margin: 0;
    }

    .flavor-text {
      font-size: 1rem;
      color: #aaaaaa;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hint-btn {
      position: absolute;
      top: 0;
      right: 10px;
      background: none;
      border: none;
      color: #f1c40f;
      font-size: 1.8rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
      display: none;
    }

    .hint-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .hint-btn:disabled {
      color: #7f8c8d;
      cursor: default;
      opacity: 0.5;
    }

    .back-btn {
      position: absolute;
      top: 0;
      left: 10px;
      background: none;
      border: none;
      color: #aaaaaa;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: #ffffff;
    }

    .guess-display {
      font-size: clamp(2rem, 8vw, 2.5rem);
      font-weight: bold;
      letter-spacing: 5px;
      color: #3498db;
      height: 60px;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-pulse {
      font-size: 1.2rem;
      color: #7f8c8d;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .game-board {
      position: relative;
      width: 90vw;
      max-width: 400px;
      height: 90vw;
      max-height: 400px;
      background: #1a1a24;
      border-radius: 50%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
      border: 1px solid #2a2a35;
    }

    #puzzleContainer {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-origin: center center;
    }

    #puzzleContainer.solved {
      animation: spinFade 1.2s ease-in-out forwards;
    }

    @keyframes spinFade {
      0% { transform: rotate(0deg) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }

    #wireLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .start-marker {
      position: absolute;
      left: 50%;
      top: 10%;
      transform: translateX(-50%);
      color: #2ecc71;
      font-size: clamp(0.6rem, 3vw, 0.8rem);
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 3;
      text-shadow: 0 0 5px rgba(46, 204, 113, 0.5);
    }

    .dot {
      position: absolute;
      width: clamp(40px, 12vw, 50px);
      height: clamp(40px, 12vw, 50px);
      background-color: #3498db;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.8), inset 0 -3px 0 rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-weight: bold;
      user-select: none;
      z-index: 2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      touch-action: none; 
    }

    .dot:hover:not(.dragging):not(.locked) {
      transform: scale(1.1);
    }

    .dot.selected {
      background-color: #e67e22;
      box-shadow: 0 0 20px rgba(230, 126, 34, 0.9);
      transform: scale(1.1);
    }

    .dot.locked {
      background-color: #2c3e50;
      border: 2px solid #f1c40f;
      color: #f1c40f;
      box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
      cursor: default;
    }
  </style>
</head>
<body>

  <div id="screen-intro" class="screen active">
    <h1 class="title">Weave</h1>
    <p class="instructions">Drag or tap the glowing orbs to swap their positions. Spell the hidden word starting from the top and reading clockwise.</p>
    <button class="btn" onclick="showScreen('screen-select')">Play</button>
  </div>

  <div id="screen-select" class="screen">
    <h1 class="title">Levels</h1>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <div id="screen-game" class="screen">
    <div class="game-header">
      <button class="back-btn" onclick="showScreen('screen-select')">⬅</button>
      <h1 class="level-text" id="levelDisplay">Level 1</h1>
      <p class="flavor-text" id="flavorDisplay">3-Letter Word</p>
      <button class="hint-btn" id="hintBtn" onclick="useHint()">💡</button>
    </div>

    <div class="guess-display" id="guessDisplay"></div> 

    <div class="game-board" id="gameBoard">
      <div class="start-marker" id="startMarker" style="display: none;">Start ⬇</div>
      <div id="puzzleContainer">
        <svg id="wireLayer"></svg>
        <div id="orbLayer"></div>
      </div>
    </div>
  </div>

  <script>
    let currentStage = 1;         
    let currentDifficulty = 3;    
    const maxStagesPerDifficulty = 5;
    const maxDifficulty = 7;
    
    let targetWord = "";
    let currentLetters = [];
    let lockedOrbs = []; 

    let orbs = [];
    let orbPositions = [];
    let selectedIndex = null;
    let isAnimating = false;

    let activeDragIndex = null;
    let isDragging = false;
    let startPointerX = 0;
    let startPointerY = 0;
    let currentTranslateX = 0;
    let currentTranslateY = 0;

    let boardSize = 0;
    let orbRadius = 0;

    const puzzleContainer = document.getElementById('puzzleContainer');
    const wireLayer = document.getElementById('wireLayer');
    const orbLayer = document.getElementById('orbLayer');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');
    const startMarker = document.getElementById('startMarker');
    const hintBtn = document.getElementById('hintBtn');
    const gameBoard = document.getElementById('gameBoard');

    function getUnlockedLevel() {
      return parseInt(localStorage.getItem('weaveUnlockedLevel')) || 3;
    }

    function setUnlockedLevel(level) {
      localStorage.setItem('weaveUnlockedLevel', level);
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
      if (screenId === 'screen-select') {
        buildLevelSelect();
      }
    }

    function buildLevelSelect() {
      const grid = document.getElementById('levelGrid');
      grid.innerHTML = '';
      const unlocked = getUnlockedLevel();

      for (let i = 3; i <= maxDifficulty; i++) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        if (i <= unlocked) {
          btn.innerHTML = `<span>${i} Letters</span> <span>▶</span>`;
          btn.onclick = () => initDifficulty(i);
        } else {
          btn.innerHTML = `<span>${i} Letters</span> <span>🔒</span>`;
          btn.disabled = true;
        }
        grid.appendChild(btn);
      }
    }

    function initDifficulty(difficulty) {
      currentDifficulty = difficulty;
      currentStage = 1;
      showScreen('screen-game');
      startLevel();
    }

    async function fetchRandomWord(length) {
      try {
        const response = await fetch(`https://random-word-api.herokuapp.com/word?length=${length}`);
        if (!response.ok) throw new Error('Network');
        const data = await response.json();
        return data[0].toUpperCase();
      } catch (error) {
        const fallbacks = { 3: "BUG", 4: "CODE", 5: "CRASH", 6: "SYSTEM", 7: "NETWORK" };
        return fallbacks[length] || "TEST";
      }
    }

    async function startLevel() {
      isAnimating = false;
      selectedIndex = null;
      activeDragIndex = null;
      isDragging = false;
      
      orbLayer.innerHTML = '';
      wireLayer.innerHTML = '';
      startMarker.style.display = 'none';
      hintBtn.style.display = 'none'; 
      hintBtn.disabled = false;
      orbs = [];
      orbPositions = [];
      lockedOrbs = [];
      
      levelDisplay.textContent = `Stage ${currentStage}`;
      flavorDisplay.textContent = `${currentDifficulty}-Letter Word`;
      
      guessDisplay.innerHTML = '<span class="loading-pulse">FETCHING...</span>';

      targetWord = await fetchRandomWord(currentDifficulty);
      lockedOrbs = new Array(targetWord.length).fill(false); 

      let scrambled;
      do {
        scrambled = targetWord.split('').sort(() => 0.5 - Math.random());
      } while (scrambled.join('') === targetWord);
      
      currentLetters = scrambled;

      boardSize = gameBoard.clientWidth;
      orbRadius = boardSize * 0.35; 
      const centerX = boardSize / 2;
      const centerY = boardSize / 2;
      const dotSize = Math.max(40, Math.min(50, boardSize * 0.12));

      const n = targetWord.length;
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');

      for (let i = 0; i < n; i++) {
        const angle = (i * 2 * Math.PI) / n - (Math.PI / 2); 
        const cx = centerX + orbRadius * Math.cos(angle);
        const cy = centerY + orbRadius * Math.sin(angle);
        
        orbPositions.push({ cx, cy });

        const dot = document.createElement('div');
        dot.classList.add('dot');
        dot.style.left = `${cx - (dotSize / 2)}px`; 
        dot.style.top = `${cy - (dotSize / 2)}px`;
        
        setupOrbInteraction(dot, i);
        
        orbLayer.appendChild(dot);
        orbs.push(dot);
      }

      polygon.setAttribute('fill', 'none');
      polygon.setAttribute('stroke', '#3498db');
      polygon.setAttribute('stroke-width', '4');
      polygon.setAttribute('stroke-linejoin', 'round');
      wireLayer.appendChild(polygon);

      startMarker.style.display = 'block'; 
      hintBtn.style.display = 'block'; 

      updateWires();
      renderOrbs();
    }

    function useHint() {
      if (isAnimating) return;

      let targetIdx = -1;
      let wrongIndices = [];
      
      for (let i = 0; i < targetWord.length; i++) {
        if (!lockedOrbs[i] && currentLetters[i] !== targetWord[i]) {
          wrongIndices.push(i);
        }
      }

      if (wrongIndices.length > 0) {
        targetIdx = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
      } else {
        let unlockedIndices = [];
        for (let i = 0; i < targetWord.length; i++) {
          if (!lockedOrbs[i]) {
            unlockedIndices.push(i);
          }
        }
        if (unlockedIndices.length > 0) {
          targetIdx = unlockedIndices[Math.floor(Math.random() * unlockedIndices.length)];
        }
      }

      if (targetIdx === -1) return; 

      const neededLetter = targetWord[targetIdx];
      let sourceIdx = -1;

      for (let i = 0; i < currentLetters.length; i++) {
        if (!lockedOrbs[i] && currentLetters[i] === neededLetter && i !== targetIdx) {
          sourceIdx = i;
          break;
        }
      }

      if (sourceIdx !== -1) {
        const temp = currentLetters[targetIdx];
        currentLetters[targetIdx] = currentLetters[sourceIdx];
        currentLetters[sourceIdx] = temp;
      }

      lockedOrbs[targetIdx] = true;
      selectedIndex = null; 

      renderOrbs(); 
      checkWinCondition();

      let remainingUnlocked = 0;
      for (let i = 0; i < lockedOrbs.length; i++) {
        if (!lockedOrbs[i]) remainingUnlocked++;
      }
      
      if (remainingUnlocked <= 1) {
        hintBtn.disabled = true;
      }
    }

    function updateWires(dragIdx = -1, dx = 0, dy = 0) {
      let points = "";
      for (let i = 0; i < orbPositions.length; i++) {
        let x = orbPositions[i].cx;
        let y = orbPositions[i].cy;
        
        if (i === dragIdx) {
          x += dx;
          y += dy;
        }
        points += `${x},${y} `;
      }
      
      const polygon = wireLayer.querySelector('polygon');
      if (polygon) {
        polygon.setAttribute('points', points.trim());
      }
    }

    function setupOrbInteraction(dot, i) {
      dot.addEventListener('pointerdown', (e) => {
        if (isAnimating || lockedOrbs[i]) return; 
        
        activeDragIndex = i;
        isDragging = false;
        startPointerX = e.clientX;
        startPointerY = e.clientY;
        
        dot.style.transition = 'none'; 
        dot.style.zIndex = 100;
        dot.setPointerCapture(e.pointerId);
      });

      dot.addEventListener('pointermove', (e) => {
        if (activeDragIndex !== i) return;
        
        const dx = e.clientX - startPointerX;
        const dy = e.clientY - startPointerY;
        
        if (!isDragging && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          isDragging = true;
          dot.classList.add('dragging');
          if (selectedIndex !== null && selectedIndex !== i) {
            selectedIndex = null; 
            renderOrbs();
          }
        }

        if (isDragging) {
          dot.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
          currentTranslateX = dx;
          currentTranslateY = dy;
          updateWires(i, dx, dy); 
        }
      });

      dot.addEventListener('pointerup', (e) => {
        if (activeDragIndex !== i) return;
        
        dot.releasePointerCapture(e.pointerId);
        activeDragIndex = null;
        dot.classList.remove('dragging');
        
        dot.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease';
        dot.style.transform = '';
        dot.style.zIndex = 2;

        if (!isDragging) {
          handleOrbTap(i);
          updateWires(); 
        } else {
          handleOrbDrop(i, currentTranslateX, currentTranslateY);
          updateWires(); 
        }
        
        isDragging = false;
        currentTranslateX = 0;
        currentTranslateY = 0;
      });

      dot.addEventListener('pointercancel', (e) => {
        if (activeDragIndex !== i) return;
        dot.releasePointerCapture(e.pointerId);
        activeDragIndex = null;
        isDragging = false;
        dot.classList.remove('dragging');
        dot.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease';
        dot.style.transform = '';
        dot.style.zIndex = 2;
        updateWires();
      });
    }

    function handleOrbTap(index) {
      if (lockedOrbs[index]) return; 

      if (selectedIndex === null) {
        selectedIndex = index;
      } else if (selectedIndex === index) {
        selectedIndex = null; 
      } else {
        swapLetters(selectedIndex, index);
        selectedIndex = null; 
      }
      renderOrbs();
    }

    function handleOrbDrop(draggedIdx, dx, dy) {
      if (lockedOrbs[draggedIdx]) return; 

      const startPos = orbPositions[draggedIdx];
      const dropX = startPos.cx + dx;
      const dropY = startPos.cy + dy;

      let closestIdx = -1;
      let minDistance = 50; 

      for (let i = 0; i < orbPositions.length; i++) {
        if (i === draggedIdx || lockedOrbs[i]) continue; 
        const pos = orbPositions[i];
        const dist = Math.hypot(dropX - pos.cx, dropY - pos.cy);
        
        if (dist < minDistance) {
          minDistance = dist;
          closestIdx = i;
        }
      }

      if (closestIdx !== -1) {
        swapLetters(draggedIdx, closestIdx);
        selectedIndex = null; 
      }
      renderOrbs(); 
    }

    function swapLetters(idx1, idx2) {
      if (lockedOrbs[idx1] || lockedOrbs[idx2]) return; 

      const temp = currentLetters[idx1];
      currentLetters[idx1] = currentLetters[idx2];
      currentLetters[idx2] = temp;
      checkWinCondition();
    }

    function renderOrbs() {
      orbs.forEach((dot, i) => {
        dot.textContent = currentLetters[i];
        dot.className = 'dot';

        if (lockedOrbs[i]) {
          dot.classList.add('locked'); 
        } else if (i === selectedIndex && !isAnimating) {
          dot.classList.add('selected'); 
        }
      });
      guessDisplay.textContent = currentLetters.join('');
    }

    function checkWinCondition() {
      if (currentLetters.join('') === targetWord) {
        isAnimating = true;
        
        guessDisplay.style.color = "#2ecc71";
        const polygon = wireLayer.querySelector('polygon');
        if (polygon) polygon.setAttribute('stroke', '#2ecc71');
        
        orbs.forEach((dot) => {
          dot.className = 'dot'; 
          dot.style.backgroundColor = "#2ecc71";
          dot.style.boxShadow = "0 0 20px rgba(46, 204, 113, 0.9)";
          dot.style.border = 'none'; 
          dot.style.color = 'white'; 
        });

        setTimeout(() => {
          puzzleContainer.classList.add('solved');
          hintBtn.style.display = 'none'; 

          setTimeout(() => {
            puzzleContainer.classList.remove('solved');
            guessDisplay.style.color = "#3498db";
            
            if (currentStage < maxStagesPerDifficulty) {
              currentStage++;
              startLevel();
            } else {
              handleDifficultyComplete();
            }
          }, 1200); 
        }, 1000); 
      }
    }

    function handleDifficultyComplete() {
      const unlocked = getUnlockedLevel();
      if (currentDifficulty >= unlocked && currentDifficulty < maxDifficulty) {
        setUnlockedLevel(currentDifficulty + 1);
      }
      showScreen('screen-select');
    }

    window.addEventListener('resize', () => {
      if (document.getElementById('screen-game').classList.contains('active') && targetWord) {
        boardSize = gameBoard.clientWidth;
        orbRadius = boardSize * 0.35;
        const centerX = boardSize / 2;
        const centerY = boardSize / 2;
        const dotSize = Math.max(40, Math.min(50, boardSize * 0.12));

        for (let i = 0; i < orbPositions.length; i++) {
          const angle = (i * 2 * Math.PI) / targetWord.length - (Math.PI / 2); 
          orbPositions[i].cx = centerX + orbRadius * Math.cos(angle);
          orbPositions[i].cy = centerY + orbRadius * Math.sin(angle);
          
          orbs[i].style.left = `${orbPositions[i].cx - (dotSize / 2)}px`; 
          orbs[i].style.top = `${orbPositions[i].cy - (dotSize / 2)}px`;
        }
        updateWires();
      }
    });

    buildLevelSelect();
  </script>
</body>
</html>
