<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Feud - Transparent Black Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-solid: #030303;
        --purple-light: #b066ff;
        --purple-glow: rgba(176, 102, 255, 0.5);
        --cyan: #00e5ff;
        --green: #00ff88;
        --red: #ff2a5f;
        --yellow: #ffb300;
        
        /* Master Glass Panel Variables */
        --master-glass-bg: linear-gradient(145deg, rgba(35, 35, 40, 0.25) 0%, rgba(5, 5, 8, 0.4) 100%);
        --master-glass-border: rgba(255, 255, 255, 0.15);
        --master-glass-shine: rgba(255, 255, 255, 0.3);
        
        /* Inner Panel Variables */
        --inner-bg: rgba(0, 0, 0, 0.3);
        --inner-border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; }

    body {
        background-color: var(--bg-solid);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        position: relative;
    }

    /* The moving light that shines through the transparent glass */
    .moving-light {
        position: fixed;
        width: 80vw;
        height: 80vw;
        background: radial-gradient(circle, rgba(140, 50, 255, 0.45) 0%, rgba(0, 0, 0, 0) 65%);
        border-radius: 50%;
        z-index: -1;
        filter: blur(90px);
        pointer-events: none;
        animation: roam 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes roam {
        0% { top: -20%; left: -20%; transform: scale(1); }
        33% { top: 20%; left: 60%; transform: scale(1.4); }
        66% { top: 80%; left: -10%; transform: scale(0.8); }
        100% { top: 10%; left: 80%; transform: scale(1.5); }
    }

    /* Master Glass Wrapper */
    .screen { 
        display: none; 
        width: 95%; 
        max-width: 1100px; 
        margin: 40px auto; 
        padding: 40px; 
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        
        background: var(--master-glass-bg);
        backdrop-filter: blur(35px);
        -webkit-backdrop-filter: blur(35px);
        border: 1px solid var(--master-glass-border);
        border-top: 1px solid var(--master-glass-shine);
        border-radius: 30px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), inset 0 1px 20px rgba(255, 255, 255, 0.05);
    }
    .screen.active { display: block; }

    /* Inner Glass Panels */
    .inner-panel {
        background: var(--inner-bg);
        border: 1px solid var(--inner-border);
        border-radius: 20px;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .logo {
        font-size: clamp(3.5rem, 8vw, 6rem);
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: -2px;
        margin-bottom: 25px;
        line-height: 1;
        text-shadow: 0 10px 20px rgba(0,0,0,0.8);
    }

    .logo span { 
        background: linear-gradient(to right, var(--cyan), var(--purple-light)); 
        -webkit-background-clip: text; 
        color: transparent; 
        text-shadow: 0 0 25px rgba(0, 229, 255, 0.4); 
    }

    h2 { text-align: center; color: #a0a0b0; font-weight: 300; font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px; }

    .btn-grid { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }

    button {
        background: rgba(30, 30, 35, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        color: #fff;
        padding: 20px 24px;
        border-radius: 16px;
        font-size: 1.3rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        backdrop-filter: blur(10px);
    }

    button:hover:not(:disabled) {
        background: rgba(50, 50, 60, 0.6);
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 229, 255, 0.3);
        border-color: var(--cyan);
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }

    #scoreboard { display: flex; gap: 12px; flex-wrap: wrap; flex: 1; justify-content: center; }

    .score-pill {
        padding: 12px 24px;
        border-radius: 12px;
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--inner-border);
        font-weight: 800;
        font-size: 1.2rem;
        transition: all 0.3s;
        color: #ccc;
    }

    .active-team {
        background: rgba(0, 229, 255, 0.15);
        border-color: var(--cyan);
        color: var(--cyan);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        transform: scale(1.05);
    }

    #strikes-display { font-size: 2.5rem; color: var(--red); font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 20px rgba(255, 42, 95, 0.6); min-width: 80px; text-align: right; }

    .query-box { 
        font-size: clamp(1.8rem, 4vw, 2.5rem); 
        font-weight: 800; 
        text-align: center; 
        padding: 35px; 
        margin-bottom: 25px; 
        border-top: 4px solid var(--cyan); 
    }

    .board-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 30px; }

    .board-row {
        display: flex;
        align-items: center;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--inner-border);
        border-radius: 16px;
        padding: 15px 20px;
        font-size: 1.4rem;
        font-weight: 500;
        text-transform: uppercase;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        overflow: hidden;
    }

    .board-row.revealed { background: rgba(0, 255, 136, 0.15); border-color: var(--green); transform: scale(1.02); }
    .board-row.missed { background: rgba(255, 42, 95, 0.15); border-color: rgba(255, 42, 95, 0.3); opacity: 0.7; }

    .rank { background: linear-gradient(135deg, var(--cyan), #0077ff); color: #fff; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; margin-right: 15px; font-size: 1.1rem; box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
    .ans-text { flex: 1; letter-spacing: 1px; }
    .ans-pts { color: var(--green); font-weight: 900; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

    .hidden-content .ans-text, .hidden-content .ans-pts { opacity: 0; }

    .choices-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; padding: 25px; }

    .choice-btn { min-height: 80px; display: flex; align-items: center; justify-content: center; padding: 15px; font-size: 1.1rem; line-height: 1.3; }
    .choice-btn.correct { background: rgba(0, 255, 136, 0.25) !important; border-color: var(--green) !important; color: var(--green); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
    .choice-btn.wrong { background: rgba(255, 42, 95, 0.25) !important; border-color: var(--red) !important; color: var(--red); box-shadow: 0 0 20px rgba(255, 42, 95, 0.2); animation: shake 0.4s; }

    #next-round-btn, #play-again-btn { background: linear-gradient(45deg, var(--cyan), #0077ff); border: none; width: 100%; max-width: 400px; margin: 30px auto 0; display: none; padding: 20px; font-size: 1.4rem; box-shadow: 0 10px 30px rgba(0, 229, 255, 0.3); color: #fff; }
    #play-again-btn { display: block; }
    #next-round-btn:hover, #play-again-btn:hover { background: linear-gradient(45deg, #0077ff, var(--cyan)); }

    .strike-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 0, 50, 0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .strike-overlay.active { opacity: 1; animation: flashRed 0.8s ease-out forwards; }
    .strike-mark { font-size: 25vw; color: var(--red); font-weight: 900; text-shadow: 0 0 50px var(--red); transform: scale(0.5); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .strike-overlay.active .strike-mark { transform: scale(1); }

    .final-standings { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
    .final-row { display: flex; justify-content: space-between; font-size: 2rem; padding: 20px 30px; background: rgba(0,0,0,0.5); border-radius: 16px; border-left: 5px solid var(--cyan); border-right: 1px solid var(--inner-border); border-top: 1px solid var(--inner-border); border-bottom: 1px solid var(--inner-border); }
    .winner-row { border-left-color: var(--yellow); background: rgba(255, 179, 0, 0.15); box-shadow: 0 0 30px rgba(255, 179, 0, 0.15); transform: scale(1.05); font-weight: 900; color: var(--yellow); }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    @keyframes flashRed { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

    @media (max-width: 600px) {
        .screen { padding: 20px; border-radius: 20px; width: 98%; }
        .board-grid { grid-template-columns: 1fr; }
        .top-bar { flex-direction: column; text-align: center; padding: 15px; }
        #strikes-display { text-align: center; }
        .rank { margin-right: 10px; width: 28px; height: 28px; font-size: 0.9rem; }
        .ans-text { font-size: 1.1rem; }
        .ans-pts { font-size: 1.2rem; }
    }
</style>
</head>
<body>

<div class="moving-light"></div>

<div class="strike-overlay" id="strike-screen">
    <div class="strike-mark">X</div>
</div>

<div id="setup-screen" class="screen active">
    <div class="logo"><span>Retro</span>Feud</div>
    <h2>Select Game Mode</h2>
    <div class="btn-grid">
        <button onclick="startGame(1)">1 Player / Co-op</button>
        <button onclick="startGame(2)">2 Teams</button>
        <button onclick="startGame(3)">3 Teams</button>
        <button onclick="startGame(4)">4 Teams</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="inner-panel top-bar">
        <div id="scoreboard"></div>
        <div id="strikes-display"></div>
    </div>

    <div class="inner-panel query-box" id="question-text"></div>

    <div class="board-grid" id="board-container"></div>

    <div class="inner-panel choices-area" id="choices-container"></div>

    <button id="next-round-btn" onclick="nextRound()">Next Round ➔</button>
</div>

<div id="end-screen" class="screen">
    <div class="logo"><span>Game</span>Over</div>
    <h2>Final Scores</h2>
    <div class="final-standings" id="final-standings"></div>
    <button id="play-again-btn" onclick="location.reload()">Play Again</button>
</div>

<script>
const library =[

    { q: "How to hide a...", a:["hickey", "dead body", "fart", "pregnancy"], d:["stolen jet", "mountain", "planet", "secret", "dinosaur", "giraffe"] },

    { q: "Which state searches for 'how to get away with murder'?", a:["Delaware", "Nevada", "Alaska", "Wyoming"], d:["Hawaii", "Rhode Island", "New York", "California", "Texas", "Ohio"] },

    { q: "Which state searches for 'sugar mamas'?", a:["California", "Texas", "Florida", "New York"], d:["Wyoming", "Idaho", "Montana", "North Dakota", "South Dakota", "Nebraska"] },
    { q: "How to legally steal...", a:["a dog", "money", "wifi", "land"], d:["a planet", "the moon", "a ghost", "gravity", "time", "clouds"] },
    { q: "Which state searches for 'how to live in the woods'?", a:["Alaska", "Montana", "Idaho", "Maine"], d:["New Jersey", "Rhode Island", "Delaware", "Connecticut", "Maryland", "Hawaii"] },
    { q: "Which state has the most missing persons per capita?", a:["Alaska", "Arizona", "Oregon", "Washington"], d:["Rhode Island", "Delaware", "New Jersey", "Connecticut", "Maryland", "Massachusetts"] },
    { q: "Can a human fight a...", a:["kangaroo", "chimpanzee", "bear", "wolf"], d:["black hole", "hurricane", "ghost", "concept", "cloud", "math problem"] },
    { q: "Which state thinks birds aren't real the most?", a:["California", "Texas", "Florida", "New York"], d:["Wyoming", "Montana", "Idaho", "North Dakota", "South Dakota", "Nebraska"] },
    { q: "What happens if I drink...", a:["bleach", "hydrogen peroxide", "rubbing alcohol", "blood"], d:["lava", "liquid nitrogen", "a cloud", "gravity", "time", "dark matter"] }
];

let teams =[];
let currentTeamIdx = 0;
let currentQIdx = 0;
let strikes = 0;
let currentAnswers =[];
let revealedCount = 0;
let isCoop = false;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startGame(numTeams) {
    isCoop = numTeams === 1;
    teams = Array.from({length: numTeams}, (_, i) => ({ id: i+1, score: 0 }));
    shuffle(library);
    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    setupRound();
}

function setupRound() {
    let qData = library[currentQIdx];
    document.getElementById('question-text').textContent = qData.q + (qData.q.endsWith('?') ? "" : "...");
    document.getElementById('strikes-display').textContent = '';
    document.getElementById('next-round-btn').style.display = 'none';
    strikes = 0;
    revealedCount = 0;

    currentAnswers = qData.a.map((text, index) => ({
        text: text,
        points: (4 - index) * 1000,
        revealed: false
    }));

    const board = document.getElementById('board-container');
    board.innerHTML = '';
    currentAnswers.forEach((ans, idx) => {
        let row = document.createElement('div');
        row.className = 'board-row hidden-content';
        row.id = `row-${idx}`;
        row.innerHTML = `
            <div class="rank">${idx + 1}</div>
            <div class="ans-text">${ans.text}</div>
            <div class="ans-pts">${ans.points}</div>
        `;
        board.appendChild(row);
    });

    const choices = document.getElementById('choices-container');
    choices.innerHTML = '';
    let combinedChoices = shuffle([...qData.a, ...shuffle(qData.d).slice(0, 4)]);
    
    combinedChoices.forEach(choice => {
        let btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice;
        btn.onclick = () => processChoice(btn, choice);
        choices.appendChild(btn);
    });

    renderScores();
}

function renderScores() {
    const sb = document.getElementById('scoreboard');
    sb.innerHTML = '';
    
    if (isCoop) {
        let pill = document.createElement('div');
        pill.className = 'score-pill active-team';
        pill.textContent = `SCORE: ${teams[0].score}`;
        sb.appendChild(pill);
    } else {
        teams.forEach((t, i) => {
            let pill = document.createElement('div');
            pill.className = `score-pill ${i === currentTeamIdx ? 'active-team' : ''}`;
            pill.textContent = `TEAM ${t.id}: ${t.score}`;
            sb.appendChild(pill);
        });
    }
}

function processChoice(btn, choiceText) {
    let matchIdx = currentAnswers.findIndex(a => a.text === choiceText);

    if (matchIdx !== -1 && !currentAnswers[matchIdx].revealed) {
        currentAnswers[matchIdx].revealed = true;
        revealedCount++;
        btn.classList.add('correct');
        
        let row = document.getElementById(`row-${matchIdx}`);
        row.classList.remove('hidden-content');
        row.classList.add('revealed');
        
        teams[currentTeamIdx].score += currentAnswers[matchIdx].points;
        renderScores();

        if (revealedCount === 4) finishRound();
    } else {
        btn.classList.add('wrong');
        triggerStrike();
    }
}

function triggerStrike() {
    strikes++;
    document.getElementById('strikes-display').textContent = 'X '.repeat(strikes).trim();
    
    let overlay = document.getElementById('strike-screen');
    overlay.classList.remove('active');
    void overlay.offsetWidth; 
    overlay.classList.add('active');

    if (strikes >= 3) {
        setTimeout(finishRound, 800);
    } else if (!isCoop) {
        currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        renderScores();
    }
}

function finishRound() {
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    
    currentAnswers.forEach((ans, idx) => {
        if (!ans.revealed) {
            let row = document.getElementById(`row-${idx}`);
            row.classList.remove('hidden-content');
            row.classList.add('missed');
        }
    });
    
    document.getElementById('next-round-btn').style.display = 'block';
}

function nextRound() {
    currentQIdx++;
    if (currentQIdx >= library.length) {
        showGameOver();
    } else {
        if (!isCoop) currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        setupRound();
    }
}

function showGameOver() {
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('end-screen').classList.add('active');
    
    let standings = document.getElementById('final-standings');
    let sortedTeams = [...teams].sort((a, b) => b.score - a.score);
    
    sortedTeams.forEach((t, i) => {
        let row = document.createElement('div');
        row.className = `final-row ${i === 0 ? 'winner-row' : ''}`;
        if (isCoop) {
            row.innerHTML = `<span>Final Score:</span><span>${t.score} PTS</span>`;
        } else {
            row.innerHTML = `<span>Team ${t.id} ${i === 0 ? '🏆' : ''}</span><span>${t.score}</span>`;
        }
        standings.appendChild(row);
    });
}
</script>
