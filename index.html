<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Orb Puzzle</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      color: #333;
    }

    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .level-text {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2c3e50;
      margin: 0;
    }

    .flavor-text {
      font-size: 1rem;
      color: #7f8c8d;
      margin-top: 5px;
    }

    .guess-display {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 5px;
      color: #3498db;
      height: 60px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .game-board {
      position: relative;
      width: 400px;
      height: 400px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .dot {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: #3498db;
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.4), inset 0 -3px 0 rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      user-select: none;
    }

    .dot.selected {
      background-color: #2ecc71;
      box-shadow: 0 2px 5px rgba(46, 204, 113, 0.4);
      transform: scale(0.9);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="game-header">
    <h1 class="level-text" id="levelDisplay">Level 1</h1>
    <p class="flavor-text" id="flavorDisplay">Spell the hidden word.</p>
  </div>

  <div class="guess-display" id="guessDisplay"></div> 

  <div class="game-board" id="gameBoard"></div>

  <script>
    let currentLevel = 1;
    const maxLevels = 4;
    let targetWord = "";
    let currentGuess = "";

    const wordBank = {
      1: ["SUN", "ART", "FOX", "JOY"],
      2: ["PLAY", "EPIC", "HERO", "STAR"],
      3: ["MAGIC", "LOGIC", "BRAIN", "POWER"],
      4: ["PUZZLE", "ACTION", "WIZARD", "GAMING"]
    };

    const gameBoard = document.getElementById('gameBoard');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');

    function startLevel(level) {
      currentGuess = "";
      guessDisplay.textContent = "";
      gameBoard.innerHTML = ''; 
      
      const wordOptions = wordBank[level];
      targetWord = wordOptions[Math.floor(Math.random() * wordOptions.length)];
      
      levelDisplay.textContent = `Level ${level}`;
      flavorDisplay.textContent = `Spell the ${targetWord.length}-letter word!`;

      const scrambledLetters = targetWord.split('').sort(() => 0.5 - Math.random());

      scrambledLetters.forEach(letter => {
        createOrb(letter);
      });
    }

    function createOrb(letter) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      dot.textContent = letter;
      
      const x = Math.random() * 310 + 20; 
      const y = Math.random() * 310 + 20;
      
      dot.style.left = `${x}px`;
      dot.style.top = `${y}px`;
      
      dot.addEventListener('click', () => {
        dot.classList.add('selected');
        currentGuess += letter;
        guessDisplay.textContent = currentGuess;
        
        checkWinCondition();
      });
      
      gameBoard.appendChild(dot);
    }

    function checkWinCondition() {
      if (currentGuess.length === targetWord.length) {
        if (currentGuess === targetWord) {
          setTimeout(() => {
            if (currentLevel < maxLevels) {
              currentLevel++;
              startLevel(currentLevel);
            } else {
              levelDisplay.textContent = "You Win!";
              flavorDisplay.textContent = "You are a word master.";
              guessDisplay.textContent = "🎉🎉🎉";
              gameBoard.innerHTML = ''; 
            }
          }, 500); 
        } else {
          guessDisplay.textContent = "TRY AGAIN";
          guessDisplay.style.color = "#e74c3c"; 
          
          setTimeout(() => {
            guessDisplay.style.color = "#3498db"; 
            startLevel(currentLevel); 
          }, 1000);
        }
      }
    }

    startLevel(currentLevel);
  </script>
</body>
</html>
