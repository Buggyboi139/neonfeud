<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Orb Puzzle - Progression Update</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #121212 0%, #1e1e2f 100%);
      color: #e0e0e0;
      overflow: hidden;
    }

    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .level-text {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      margin: 0;
    }

    .flavor-text {
      font-size: 1.1rem;
      color: #aaaaaa;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .guess-display {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 5px;
      color: #3498db;
      height: 60px;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
      transition: color 0.3s ease;
    }

    .game-board {
      position: relative;
      width: 400px;
      height: 400px;
      background: #1a1a24;
      border-radius: 50%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
      border: 1px solid #2a2a35;
    }

    #puzzleContainer {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-origin: center center;
    }

    #puzzleContainer.solved {
      animation: spinFade 1.2s ease-in-out forwards;
    }

    @keyframes spinFade {
      0% { transform: rotate(0deg) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }

    #wireLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .start-marker {
      position: absolute;
      left: 50%;
      top: 25px;
      transform: translateX(-50%);
      color: #2ecc71;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 3;
      text-shadow: 0 0 5px rgba(46, 204, 113, 0.5);
    }

    .dot {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: #3498db;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.8), inset 0 -3px 0 rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      user-select: none;
      z-index: 2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      touch-action: none; 
    }

    .dot:hover:not(.dragging) {
      transform: scale(1.1);
    }

    .dot.selected {
      background-color: #e67e22;
      box-shadow: 0 0 20px rgba(230, 126, 34, 0.9);
      transform: scale(1.1);
    }

    /* Modal Overlay Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: #1a1a24;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid #3498db;
      box-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
      transform: translateY(20px);
      transition: transform 0.4s ease;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 2.5rem;
      color: #2ecc71;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .modal-text {
      font-size: 1.2rem;
      color: #e0e0e0;
      margin-bottom: 30px;
    }

    .next-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.2s;
    }

    .next-btn:hover {
      background: #2980b9;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="game-header">
    <h1 class="level-text" id="levelDisplay">Level 1</h1>
    <p class="flavor-text" id="flavorDisplay">3-Letter Words</p>
  </div>

  <div class="guess-display" id="guessDisplay"></div> 

  <div class="game-board" id="gameBoard">
    <div class="start-marker" id="startMarker">Start ⬇</div>
    <div id="puzzleContainer">
      <svg id="wireLayer"></svg>
      <div id="orbLayer"></div>
    </div>
  </div>

  <div class="modal-overlay" id="levelUpModal">
    <div class="modal-content">
      <h2 class="modal-title" id="modalTitle">Clear!</h2>
      <p class="modal-text" id="modalText">Difficulty increased. Get ready for 4-letter words!</p>
      <button class="next-btn" onclick="startNextDifficulty()">Continue</button>
    </div>
  </div>

  <script>
    let currentLevel = 1;         // Goes from 1 to 5
    let currentDifficulty = 3;    // Number of letters (starts at 3)
    const maxLevelsPerDifficulty = 5;
    const maxDifficulty = 7;
    
    let targetWord = "";
    let currentLetters = [];
    let activeLevelWords = [];
    
    let orbs = [];
    let orbPositions = [];
    let selectedIndex = null;
    let isAnimating = false;

    // Drag state
    let activeDragIndex = null;
    let isDragging = false;
    let startPointerX = 0;
    let startPointerY = 0;
    let currentTranslateX = 0;
    let currentTranslateY = 0;

    // Word Bank mapped by word length (difficulty)
    const wordBank = {
      3: ["SUN", "ART", "FOX", "SKY", "CAT"],
      4: ["PLAY", "EPIC", "LUNA", "STAR", "HERO"],
      5: ["MAGIC", "CYBER", "BRAIN", "POWER", "LIGHT"],
      6: ["PUZZLE", "SUBARU", "WIZARD", "GAMING", "PLANET"],
      7: ["MYSTERY", "VETERAN", "PHOENIX", "JOURNEY", "CRYSTAL"]
    };

    const puzzleContainer = document.getElementById('puzzleContainer');
    const wireLayer = document.getElementById('wireLayer');
    const orbLayer = document.getElementById('orbLayer');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');
    const startMarker = document.getElementById('startMarker');
    const levelUpModal = document.getElementById('levelUpModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');

    function startLevel() {
      isAnimating = false;
      selectedIndex = null;
      activeDragIndex = null;
      isDragging = false;
      
      orbLayer.innerHTML = '';
      wireLayer.innerHTML = '';
      orbs = [];
      orbPositions = [];
      
      // Load and shuffle words if starting a new difficulty tier
      if (currentLevel === 1) {
        activeLevelWords = [...wordBank[currentDifficulty]].sort(() => 0.5 - Math.random());
      }
      
      targetWord = activeLevelWords[currentLevel - 1];
      
      levelDisplay.textContent = `Level ${currentLevel}`;
      flavorDisplay.textContent = `${currentDifficulty}-Letter Word`;

      let scrambled;
      do {
        scrambled = targetWord.split('').sort(() => 0.5 - Math.random());
      } while (scrambled.join('') === targetWord);
      
      currentLetters = scrambled;

      const n = targetWord.length;
      const radius = 130; 
      const centerX = 200;
      const centerY = 200;

      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');

      for (let i = 0; i < n; i++) {
        const angle = (i * 2 * Math.PI) / n - (Math.PI / 2); 
        const cx = centerX + radius * Math.cos(angle);
        const cy = centerY + radius * Math.sin(angle);
        
        orbPositions.push({ cx, cy });

        const dot = document.createElement('div');
        dot.classList.add('dot');
        dot.style.left = `${cx - 25}px`; 
        dot.style.top = `${cy - 25}px`;
        
        setupDragAndDrop(dot, i);
        
        orbLayer.appendChild(dot);
        orbs.push(dot);
      }

      polygon.setAttribute('fill', 'none');
      polygon.setAttribute('stroke', '#3498db');
      polygon.setAttribute('stroke-width', '4');
      polygon.setAttribute('stroke-linejoin', 'round');
      wireLayer.appendChild(polygon);

      updateWires();
      renderOrbs();
    }

    function updateWires(dragIdx = -1, dx = 0, dy = 0) {
      let points = "";
      for (let i = 0; i < orbPositions.length; i++) {
        let x = orbPositions[i].cx;
        let y = orbPositions[i].cy;
        
        if (i === dragIdx) {
          x += dx;
          y += dy;
        }
        points += `${x},${y} `;
      }
      
      const polygon = wireLayer.querySelector('polygon');
      if (polygon) {
        polygon.setAttribute('points', points.trim());
      }
    }

    function setupDragAndDrop(dot, i) {
      dot.addEventListener('pointerdown', (e) => {
        if (isAnimating) return;
        
        activeDragIndex = i;
        isDragging = false;
        startPointerX = e.clientX;
        startPointerY = e.clientY;
        
        dot.style.transition = 'none'; 
        dot.style.zIndex = 100;
        dot.setPointerCapture(e.pointerId);
      });

      dot.addEventListener('pointermove', (e) => {
        if (activeDragIndex !== i) return;
        
        const dx = e.clientX - startPointerX;
        const dy = e.clientY - startPointerY;
        
        if (!isDragging && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          isDragging = true;
          dot.classList.add('dragging');
          if (selectedIndex !== null && selectedIndex !== i) {
            selectedIndex = null; 
            renderOrbs();
          }
        }

        if (isDragging) {
          dot.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
          currentTranslateX = dx;
          currentTranslateY = dy;
          updateWires(i, dx, dy); 
        }
      });

      dot.addEventListener('pointerup', (e) => {
        if (activeDragIndex !== i) return;
        
        dot.releasePointerCapture(e.pointerId);
        activeDragIndex = null;
        dot.classList.remove('dragging');
        
        dot.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease';
        dot.style.transform = '';
        dot.style.zIndex = 2;

        if (!isDragging) {
          handleOrbTap(i);
          updateWires(); 
        } else {
          handleOrbDrop(i, currentTranslateX, currentTranslateY);
          updateWires(); 
        }
        
        isDragging = false;
        currentTranslateX = 0;
        currentTranslateY = 0;
      });

      dot.addEventListener('pointercancel', (e) => {
        if (activeDragIndex !== i) return;
        dot.releasePointerCapture(e.pointerId);
        activeDragIndex = null;
        isDragging = false;
        dot.classList.remove('dragging');
        dot.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease';
        dot.style.transform = '';
        dot.style.zIndex = 2;
        updateWires();
      });
    }

    function handleOrbTap(index) {
      if (selectedIndex === null) {
        selectedIndex = index;
      } else if (selectedIndex === index) {
        selectedIndex = null; 
      } else {
        swapLetters(selectedIndex, index);
        selectedIndex = null; 
      }
      renderOrbs();
    }

    function handleOrbDrop(draggedIdx, dx, dy) {
      const startPos = orbPositions[draggedIdx];
      const dropX = startPos.cx + dx;
      const dropY = startPos.cy + dy;

      let closestIdx = -1;
      let minDistance = 50; 

      for (let i = 0; i < orbPositions.length; i++) {
        if (i === draggedIdx) continue;
        const pos = orbPositions[i];
        const dist = Math.hypot(dropX - pos.cx, dropY - pos.cy);
        
        if (dist < minDistance) {
          minDistance = dist;
          closestIdx = i;
        }
      }

      if (closestIdx !== -1) {
        swapLetters(draggedIdx, closestIdx);
        selectedIndex = null; 
      }
      renderOrbs(); 
    }

    function swapLetters(idx1, idx2) {
      const temp = currentLetters[idx1];
      currentLetters[idx1] = currentLetters[idx2];
      currentLetters[idx2] = temp;
      checkWinCondition();
    }

    function renderOrbs() {
      orbs.forEach((dot, i) => {
        dot.textContent = currentLetters[i];
        if (i === selectedIndex && !isAnimating) {
          dot.classList.add('selected');
        } else {
          dot.classList.remove('selected');
        }
      });
      guessDisplay.textContent = currentLetters.join('');
    }

    function checkWinCondition() {
      if (currentLetters.join('') === targetWord) {
        isAnimating = true;
        
        guessDisplay.style.color = "#2ecc71";
        const polygon = wireLayer.querySelector('polygon');
        if (polygon) polygon.setAttribute('stroke', '#2ecc71');
        
        orbs.forEach(dot => {
          dot.classList.remove('selected');
          dot.style.backgroundColor = "#2ecc71";
          dot.style.boxShadow = "0 0 20px rgba(46, 204, 113, 0.9)";
        });

        puzzleContainer.classList.add('solved');

        setTimeout(() => {
          puzzleContainer.classList.remove('solved');
          guessDisplay.style.color = "#3498db";
          
          if (currentLevel < maxLevelsPerDifficulty) {
            currentLevel++;
            startLevel();
          } else {
            showLevelUpModal();
          }
        }, 1200); 
      }
    }

    function showLevelUpModal() {
      if (currentDifficulty < maxDifficulty) {
        modalTitle.textContent = "Perfect Clear!";
        modalText.textContent = `You've mastered ${currentDifficulty}-letter words. Get ready for ${currentDifficulty + 1} letters!`;
        levelUpModal.classList.add('active');
      } else {
        modalTitle.textContent = "You Win!";
        modalText.textContent = "You are a true word master. You've beaten the game!";
        document.querySelector('.next-btn').style.display = 'none';
        levelUpModal.classList.add('active');
      }
    }

    function startNextDifficulty() {
      levelUpModal.classList.remove('active');
      currentDifficulty++;
      currentLevel = 1;
      // Slight delay to allow modal to fade out before starting
      setTimeout(() => {
        startLevel();
      }, 400); 
    }

    // Start the game
    startLevel();
  </script>
</body>
</html>
