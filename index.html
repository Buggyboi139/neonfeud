<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Orb Puzzle - Dynamic Wires</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #121212 0%, #1e1e2f 100%);
      color: #e0e0e0;
      overflow: hidden;
    }

    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .level-text {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      margin: 0;
    }

    .flavor-text {
      font-size: 1rem;
      color: #aaaaaa;
      margin-top: 5px;
    }

    .guess-display {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 5px;
      color: #3498db;
      height: 60px;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
      transition: color 0.3s ease;
    }

    .game-board {
      position: relative;
      width: 400px;
      height: 400px;
      background: #1a1a24;
      border-radius: 50%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
      border: 1px solid #2a2a35;
    }

    #puzzleContainer {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-origin: center center;
    }

    #puzzleContainer.solved {
      animation: spinFade 1.2s ease-in-out forwards;
    }

    @keyframes spinFade {
      0% { transform: rotate(0deg) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }

    #wireLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .start-marker {
      position: absolute;
      left: 50%;
      top: 25px;
      transform: translateX(-50%);
      color: #2ecc71;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 3;
      text-shadow: 0 0 5px rgba(46, 204, 113, 0.5);
    }

    .dot {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: #3498db;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.8), inset 0 -3px 0 rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      user-select: none;
      z-index: 2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      touch-action: none; 
    }

    .dot:hover:not(.dragging) {
      transform: scale(1.1);
    }

    .dot.selected {
      background-color: #e67e22;
      box-shadow: 0 0 20px rgba(230, 126, 34, 0.9);
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="game-header">
    <h1 class="level-text" id="levelDisplay">Level 1 - 1</h1>
    <p class="flavor-text" id="flavorDisplay">Drag or tap orbs to spell the word clockwise.</p>
  </div>

  <div class="guess-display" id="guessDisplay"></div> 

  <div class="game-board" id="gameBoard">
    <div class="start-marker" id="startMarker">Start ⬇</div>
    <div id="puzzleContainer">
      <svg id="wireLayer"></svg>
      <div id="orbLayer"></div>
    </div>
  </div>

  <script>
    let currentLevel = 1;
    let currentStage = 1;
    const maxLevels = 5;
    const stagesPerLevel = 5;
    
    let targetWord = "";
    let currentLetters = [];
    let activeLevelWords = [];
    
    let orbs = [];
    let orbPositions = [];
    let selectedIndex = null;
    let isAnimating = false;

    // Drag state
    let activeDragIndex = null;
    let isDragging = false;
    let startPointerX = 0;
    let startPointerY = 0;
    let currentTranslateX = 0;
    let currentTranslateY = 0;

    // 5 levels, at least 5 words each
    const wordBank = {
      1: ["SUN", "ART", "FOX", "JOY", "CAT", "DOG", "BUG", "HAT"],       // 3 letters
      2: ["PLAY", "EPIC", "HERO", "STAR", "MOON", "BIRD", "FIRE", "WIND"], // 4 letters
      3: ["MAGIC", "LOGIC", "BRAIN", "POWER", "LIGHT", "WATER", "EARTH", "SPACE"], // 5 letters
      4: ["PUZZLE", "ACTION", "WIZARD", "GAMING", "PLANET", "ROCKET", "CASTLE", "DRAGON"], // 6 letters
      5: ["MYSTERY", "JOURNEY", "PHOENIX", "CRYSTAL", "VOLCANO", "WARRIOR", "MONSTER", "MACHINE"] // 7 letters
    };

    const puzzleContainer = document.getElementById('puzzleContainer');
    const wireLayer = document.getElementById('wireLayer');
    const orbLayer = document.getElementById('orbLayer');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');
    const startMarker = document.getElementById('startMarker');

    function startLevel() {
      isAnimating = false;
      selectedIndex = null;
      activeDragIndex = null;
      isDragging = false;
      
      orbLayer.innerHTML = '';
      wireLayer.innerHTML = '';
      orbs = [];
      orbPositions = [];
      
      // Shuffle words when starting a new major level
      if (currentStage === 1) {
        activeLevelWords = [...wordBank[currentLevel]].sort(() => 0.5 - Math.random());
      }
      
      targetWord = activeLevelWords[currentStage - 1];
      
      levelDisplay.textContent = `Level ${currentLevel} - ${currentStage}`;
      flavorDisplay.textContent = `Spell a ${targetWord.length}-letter word.`;

      let scrambled;
      do {
        scrambled = targetWord.split('').sort(() => 0.5 - Math.random());
      } while (scrambled.join('') === targetWord);
      
      currentLetters = scrambled;

      const n = targetWord.length;
      const radius = 130; 
      const centerX = 200;
      const centerY = 200;

      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');

      for (let i = 0; i < n; i++) {
        const angle = (i * 2 * Math.PI) / n - (Math.PI / 2); 
        const cx = centerX + radius * Math.cos(angle);
        const cy = centerY + radius * Math.sin(angle);
        
        orbPositions.push({ cx, cy });

        const dot = document.createElement('div');
        dot.classList.add('dot');
        dot.style.left = `${cx - 25}px`; 
        dot.style.top = `${cy - 25}px`;
        
        setupDragAndDrop(dot, i);
        
        orbLayer.appendChild(dot);
        orbs.push(dot);
      }

      polygon.setAttribute('fill', 'none');
      polygon.setAttribute('stroke', '#3498db');
      polygon.setAttribute('stroke-width', '4');
      polygon.setAttribute('stroke-linejoin', 'round');
      wireLayer.appendChild(polygon);

      updateWires(); // Initial wire draw
      renderOrbs();
    }

    // Dynamically redraws the SVG polygon
    function updateWires(dragIdx = -1, dx = 0, dy = 0) {
      let points = "";
      for (let i = 0; i < orbPositions.length; i++) {
        let x = orbPositions[i].cx;
        let y = orbPositions[i].cy;
        
        if (i === dragIdx) {
          x += dx;
          y += dy;
        }
        points += `${x},${y} `;
      }
      
      const polygon = wireLayer.querySelector('polygon');
      if (polygon) {
        polygon.setAttribute('points', points.trim());
      }
    }

    function setupDragAndDrop(dot, i) {
      dot.addEventListener('pointerdown', (e) => {
        if (isAnimating) return;
        
        activeDragIndex = i;
        isDragging = false;
        startPointerX = e.clientX;
        startPointerY = e.clientY;
        
        dot.style.transition = 'none'; 
        dot.style.zIndex = 100;
        dot.setPointerCapture(e.pointerId);
      });

      dot.addEventListener('pointermove', (e) => {
        if (activeDragIndex !== i) return;
        
        const dx = e.clientX - startPointerX;
        const dy = e.clientY - startPointerY;
        
        if (!isDragging && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          isDragging = true;
          dot.classList.add('dragging');
          if (selectedIndex !== null && selectedIndex !== i) {
            selectedIndex = null; 
            renderOrbs();
          }
        }

        if (isDragging) {
          dot.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
          currentTranslateX = dx;
          currentTranslateY = dy;
          updateWires(i, dx, dy); // Update wires while dragging
        }
      });

      dot.addEventListener('pointerup', (e) => {
        if (activeDragIndex !== i) return;
        
        dot.releasePointerCapture(e.pointerId);
        activeDragIndex = null;
        dot.classList.remove('dragging');
        
        dot.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease';
        dot.style.transform = '';
        dot.style.zIndex = 2;

        if (!isDragging) {
          handleOrbTap(i);
          updateWires(); // Snap wires back instantly
        } else {
          handleOrbDrop(i, currentTranslateX, currentTranslateY);
          updateWires(); // Snap wires back after drop calculations
        }
        
        isDragging = false;
        currentTranslateX = 0;
        currentTranslateY = 0;
      });

      dot.addEventListener('pointercancel', (e) => {
        if (activeDragIndex !== i) return;
        dot.releasePointerCapture(e.pointerId);
        activeDragIndex = null;
        isDragging = false;
        dot.classList.remove('dragging');
        dot.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease';
        dot.style.transform = '';
        dot.style.zIndex = 2;
        updateWires();
      });
    }

    function handleOrbTap(index) {
      if (selectedIndex === null) {
        selectedIndex = index;
      } else if (selectedIndex === index) {
        selectedIndex = null; 
      } else {
        swapLetters(selectedIndex, index);
        selectedIndex = null; 
      }
      renderOrbs();
    }

    function handleOrbDrop(draggedIdx, dx, dy) {
      const startPos = orbPositions[draggedIdx];
      const dropX = startPos.cx + dx;
      const dropY = startPos.cy + dy;

      let closestIdx = -1;
      let minDistance = 50; 

      for (let i = 0; i < orbPositions.length; i++) {
        if (i === draggedIdx) continue;
        const pos = orbPositions[i];
        const dist = Math.hypot(dropX - pos.cx, dropY - pos.cy);
        
        if (dist < minDistance) {
          minDistance = dist;
          closestIdx = i;
        }
      }

      if (closestIdx !== -1) {
        swapLetters(draggedIdx, closestIdx);
        selectedIndex = null; 
      }
      renderOrbs(); 
    }

    function swapLetters(idx1, idx2) {
      const temp = currentLetters[idx1];
      currentLetters[idx1] = currentLetters[idx2];
      currentLetters[idx2] = temp;
      checkWinCondition();
    }

    function renderOrbs() {
      orbs.forEach((dot, i) => {
        dot.textContent = currentLetters[i];
        if (i === selectedIndex && !isAnimating) {
          dot.classList.add('selected');
        } else {
          dot.classList.remove('selected');
        }
      });
      guessDisplay.textContent = currentLetters.join('');
    }

    function checkWinCondition() {
      if (currentLetters.join('') === targetWord) {
        isAnimating = true;
        
        guessDisplay.style.color = "#2ecc71";
        const polygon = wireLayer.querySelector('polygon');
        if (polygon) polygon.setAttribute('stroke', '#2ecc71');
        
        orbs.forEach(dot => {
          dot.classList.remove('selected');
          dot.style.backgroundColor = "#2ecc71";
          dot.style.boxShadow = "0 0 20px rgba(46, 204, 113, 0.9)";
        });

        puzzleContainer.classList.add('solved');

        setTimeout(() => {
          puzzleContainer.classList.remove('solved');
          guessDisplay.style.color = "#3498db";
          
          if (currentStage < stagesPerLevel) {
            currentStage++;
            startLevel();
          } else if (currentLevel < maxLevels) {
            currentLevel++;
            currentStage = 1;
            startLevel();
          } else {
            levelDisplay.textContent = "You Win!";
            flavorDisplay.textContent = "You are a true word master.";
            guessDisplay.textContent = "🎉🎉🎉";
            orbLayer.innerHTML = '';
            wireLayer.innerHTML = '';
            startMarker.style.display = 'none';
          }
        }, 1200); 
      }
    }

    // Boot it up
    startLevel();
  </script>
</body>
</html>
