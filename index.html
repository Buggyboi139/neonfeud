<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Feud - Ultimate Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-solid: #030005;
        --purple-light: #b066ff;
        --purple-mid: #6b1ba8;
        --purple-dark: #2a004a;
        --cyan: #00e5ff;
        --green: #00ff88;
        --red: #ff2a5f;
        --border-shine: rgba(176, 102, 255, 0.5);
    }

    * { box-sizing: border-box; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; }

    body {
        background-color: var(--bg-solid);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        position: relative;
    }

    .moving-light {
        position: fixed;
        width: 70vw;
        height: 70vw;
        background: radial-gradient(circle, rgba(138, 43, 226, 0.35) 0%, rgba(0, 0, 0, 0) 65%);
        border-radius: 50%;
        z-index: -1;
        filter: blur(60px);
        pointer-events: none;
        animation: roam 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes roam {
        0% { top: -10%; left: -20%; transform: scale(1); }
        33% { top: 30%; left: 50%; transform: scale(1.3); }
        66% { top: 70%; left: -10%; transform: scale(0.9); }
        100% { top: 10%; left: 80%; transform: scale(1.5); }
    }

    .glass {
        background: linear-gradient(145deg, rgba(60, 15, 95, 0.3) 0%, rgba(0, 0, 0, 0.8) 100%);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(176, 102, 255, 0.2);
        border-top: 1px solid var(--border-shine);
        border-radius: 24px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(176, 102, 255, 0.05);
    }

    .screen { display: none; width: 95%; max-width: 1000px; margin: 30px auto; padding: 35px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .screen.active { display: block; }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .logo {
        font-size: clamp(3rem, 8vw, 5rem);
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: -2px;
        margin-bottom: 25px;
        line-height: 1;
    }

    .logo span { background: linear-gradient(to right, #e2b3ff, var(--purple-light)); -webkit-background-clip: text; color: transparent; text-shadow: 0 0 20px rgba(176, 102, 255, 0.5); }

    h2 { text-align: center; color: #d4b3ff; font-weight: 300; font-size: 1.5rem; margin-bottom: 30px; }

    .btn-grid { display: flex; flex-direction: column; gap: 15px; max-width: 350px; margin: 0 auto; }

    button {
        background: linear-gradient(135deg, rgba(90, 20, 140, 0.5), rgba(10, 0, 20, 0.9));
        border: 1px solid var(--purple-mid);
        border-top: 1px solid var(--purple-light);
        color: #fff;
        padding: 18px 24px;
        border-radius: 16px;
        font-size: 1.2rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    button:hover:not(:disabled) {
        background: linear-gradient(135deg, rgba(130, 40, 190, 0.6), rgba(30, 0, 50, 0.9));
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(176, 102, 255, 0.4);
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }

    #scoreboard { display: flex; gap: 12px; flex-wrap: wrap; flex: 1; justify-content: center; }

    .score-pill {
        padding: 12px 24px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(50, 10, 80, 0.6), rgba(0,0,0,0.8));
        border: 1px solid rgba(176, 102, 255, 0.2);
        font-weight: 800;
        font-size: 1.2rem;
        transition: all 0.3s;
    }

    .active-team {
        background: linear-gradient(180deg, rgba(176, 102, 255, 0.3), rgba(60, 15, 95, 0.8));
        border-color: var(--purple-light);
        box-shadow: 0 0 20px rgba(176, 102, 255, 0.4);
        transform: scale(1.05);
    }

    #strikes-display { font-size: 2.5rem; color: var(--red); font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 20px var(--red); min-width: 80px; text-align: right; }

    .query-box { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 800; text-align: center; padding: 30px; margin-bottom: 25px; border-top: 4px solid var(--purple-light); }

    .board-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 30px; }

    .board-row {
        display: flex;
        align-items: center;
        background: linear-gradient(90deg, rgba(40, 5, 60, 0.6) 0%, rgba(0, 0, 0, 0.9) 100%);
        border: 1px solid rgba(176, 102, 255, 0.15);
        border-radius: 16px;
        padding: 15px 20px;
        font-size: 1.4rem;
        font-weight: 500;
        text-transform: uppercase;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        overflow: hidden;
    }

    .board-row.revealed { background: linear-gradient(90deg, rgba(0, 255, 136, 0.2), rgba(0,0,0,0.8)); border-color: var(--green); transform: scale(1.02); }
    .board-row.missed { background: linear-gradient(90deg, rgba(255, 42, 95, 0.2), rgba(0,0,0,0.8)); border-color: rgba(255, 42, 95, 0.3); opacity: 0.7; }

    .rank { background: linear-gradient(135deg, var(--purple-light), var(--purple-dark)); color: #fff; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; margin-right: 15px; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.2); }
    .ans-text { flex: 1; letter-spacing: 1px; }
    .ans-pts { color: var(--green); font-weight: 900; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

    .hidden-content .ans-text, .hidden-content .ans-pts { opacity: 0; }

    .choices-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; padding: 25px; }

    .choice-btn { min-height: 80px; display: flex; align-items: center; justify-content: center; padding: 15px; font-size: 1.1rem; line-height: 1.3; }
    .choice-btn.correct { background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 0, 0, 0.8)) !important; border-color: var(--green) !important; color: var(--green); box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
    .choice-btn.wrong { background: linear-gradient(135deg, rgba(255, 42, 95, 0.3), rgba(0, 0, 0, 0.8)) !important; border-color: var(--red) !important; color: var(--red); box-shadow: 0 0 20px rgba(255, 42, 95, 0.3); animation: shake 0.4s; }

    #next-round-btn, #play-again-btn { background: linear-gradient(45deg, var(--purple-mid), var(--purple-light)); border: 1px solid #fff; width: 100%; max-width: 400px; margin: 20px auto 0; display: none; padding: 20px; font-size: 1.4rem; box-shadow: 0 10px 30px rgba(176, 102, 255, 0.3); }
    #play-again-btn { display: block; }

    .strike-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 0, 50, 0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .strike-overlay.active { opacity: 1; animation: flashRed 0.8s ease-out forwards; }
    .strike-mark { font-size: 25vw; color: var(--red); font-weight: 900; text-shadow: 0 0 50px var(--red); transform: scale(0.5); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .strike-overlay.active .strike-mark { transform: scale(1); }

    .final-standings { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
    .final-row { display: flex; justify-content: space-between; font-size: 2rem; padding: 20px 30px; background: linear-gradient(90deg, rgba(50, 10, 80, 0.5), rgba(0,0,0,0.8)); border-radius: 16px; border-left: 5px solid var(--purple-light); }
    .winner-row { border-left-color: var(--green); background: linear-gradient(90deg, rgba(0, 255, 136, 0.2), rgba(0,0,0,0.8)); box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); transform: scale(1.05); font-weight: 900; }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    @keyframes flashRed { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

    @media (max-width: 600px) {
        .board-grid { grid-template-columns: 1fr; }
        .top-bar { flex-direction: column; text-align: center; padding: 15px; }
        #strikes-display { text-align: center; }
        .rank { margin-right: 10px; width: 28px; height: 28px; font-size: 0.9rem; }
        .ans-text { font-size: 1.1rem; }
        .ans-pts { font-size: 1.2rem; }
        .screen { padding: 20px; }
    }
</style>
</head>
<body>

<div class="moving-light"></div>

<div class="strike-overlay" id="strike-screen">
    <div class="strike-mark">X</div>
</div>

<div id="setup-screen" class="screen active glass">
    <div class="logo"><span>Retro</span>Feud</div>
    <h2>Select Game Mode</h2>
    <div class="btn-grid">
        <button onclick="startGame(1)">1 Player / Co-op</button>
        <button onclick="startGame(2)">2 Teams</button>
        <button onclick="startGame(3)">3 Teams</button>
        <button onclick="startGame(4)">4 Teams</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="top-bar glass">
        <div id="scoreboard"></div>
        <div id="strikes-display"></div>
    </div>

    <div class="query-box glass" id="question-text"></div>

    <div class="board-grid" id="board-container"></div>

    <div class="choices-area glass" id="choices-container"></div>

    <button id="next-round-btn" onclick="nextRound()">Next Round ➔</button>
</div>

<div id="end-screen" class="screen glass">
    <div class="logo"><span>Game</span>Over</div>
    <h2>Final Scores</h2>
    <div class="final-standings" id="final-standings"></div>
    <button id="play-again-btn" onclick="location.reload()">Play Again</button>
</div>

<script>
const library =[
    { q: "Why does my dog...", a: ["eat grass", "lick me", "stare at me", "sigh"], d:["do taxes", "speak french", "drive", "zoom", "invest in crypto", "judge my outfits"] },
    { q: "Is it illegal to...", a:["drive barefoot", "kill a praying mantis", "own a monkey", "collect rainwater"], d:["eat soup with a fork", "sleep in a bank", "blink rapidly", "eat a swan", "marry a ghost", "walk backwards"] },
    { q: "I accidentally ate...", a: ["mold", "raw chicken", "plastic", "a bug"], d:["a car", "my homework", "a ghost", "gravity", "a magnet", "dry ice"] },
    { q: "How to hide a...", a:["hickey", "dead body", "fart", "pregnancy"], d:["stolen jet", "mountain", "planet", "secret", "dinosaur", "giraffe"] },
    { q: "My husband thinks he is...", a:["always right", "a woman", "god", "funny"], d:["a potato", "batman", "invisible", "a cat", "a sovereign citizen", "the president"] },
    { q: "I think my child is...", a:["a psychopath", "gifted", "autistic", "a genius"], d:["a vampire", "a spy", "a robot", "an alien", "a time traveler", "a millionaire"] },
    { q: "Can you die from...", a:["a broken heart", "drinking too much water", "lack of sleep", "holding your breath"], d:["doing math", "bad jokes", "singing off key", "blinking", "eating too much cheese", "extreme boredom"] },
    { q: "Why is the sky...", a:["blue", "purple", "falling", "orange today"], d:["loud", "crunchy", "angry", "fake", "screaming", "green"] },
    { q: "Do ghosts...", a:["exist", "sleep", "eat", "feel cold"], d:["pay taxes", "use wifi", "vote", "shop", "get sunburned", "have passports"] },
    { q: "Is my cat trying to...", a:["kill me", "tell me something", "eat me", "protect me"], d:["hack my router", "build a bomb", "fly", "sue me", "start a podcast", "steal my identity"] },
    { q: "Why does it hurt when I...", a: ["pee", "breathe", "swallow", "poop"], d:["think", "wink", "smile", "exist", "look at my bank account", "do math"] },
    { q: "Where can I buy a...", a:["monkey", "capybara", "sloth", "penguin"], d:["dragon", "soul", "cloud", "time machine", "dinosaur", "goblin"] },
    { q: "Why is my poop...", a:["green", "black", "floating", "spicy"], d:["glowing", "invisible", "square", "screaming", "musical", "carbonated"] },
    { q: "Can a human...", a:["mate with an animal", "outrun a bear", "survive without water", "breathe liquid"], d:["lay an egg", "photosynthesize", "turn into a wolf", "fly", "unhinge their jaw", "regrow a limb"] },
    { q: "Why did they cancel...", a:["firefly", "manifest", "the owl house", "mindhunter"], d:["gravity", "the sun", "tuesday", "breathing", "the alphabet", "sleep"] },
    { q: "Which state has the worst...", a:["drivers", "weather", "roads", "schools"], d:["breath", "haircuts", "ghosts", "gravity", "aliens", "vibes"] },
    { q: "Which state has the most...", a:["cows", "billionaires", "serial killers", "lakes"], d:["dragons", "vampires", "invisible people", "sadness", "wizards", "time machines"] },
    { q: "Which state is the most...", a:["boring", "dangerous", "expensive", "racist"], d:["haunted", "radioactive", "sticky", "loud", "fake", "stretchy"] },
    { q: "Which state is shaped like a...", a:["mitten", "boot", "gun", "pan"], d:["potato", "face", "dinosaur", "cloud", "pizza", "shoe"] },
    { q: "Which state is known for...", a:["cheese", "potatoes", "weird news", "lobsters"], d:["alien abductions", "wizards", "bad vibes", "lasers", "time travel", "magic"] },
    { q: "Which state has no...", a:["taxes", "speed limit", "trees", "laws"], d:["gravity", "oxygen", "birds", "sun", "water", "colors"] },
    { q: "Why is Florida so...", a:["crazy", "hot", "weird", "humid"], d:["loud", "sticky", "haunted", "fast", "glowing", "angry"] },
    { q: "Why is Texas so...", a:["big", "hot", "conservative", "flat"], d:["loud", "crunchy", "aggressive", "shiny", "spicy", "heavy"] },
    { q: "Why is California so...", a:["expensive", "liberal", "populated", "dry"], d:["squishy", "stretchy", "fake", "glowing", "hollow", "loud"] },
    { q: "Is Ohio...", a:["real", "a good place to live", "dangerous", "in the midwest"], d:["haunted", "a simulation", "taking over", "a planet", "a myth", "contagious"] },
    { q: "Does Wyoming...", a:["exist", "have internet", "have people", "have an airport"], d:["have gravity", "float", "have dragons", "glow", "have laws", "move around"] },
    { q: "Why do people move to...", a:["texas", "florida", "colorado", "arizona"], d:["the moon", "the ocean", "ohio", "my house", "the void", "mars"] },
    { q: "Which state drinks the most...", a:["beer", "coffee", "milk", "soda"], d:["motor oil", "lava", "tears", "pickle juice", "swamp water", "bleach"] },
    { q: "Which state is best for...", a:["retirees", "taxes", "families", "business"], d:["fighting bears", "hiding", "ghosts", "wizards", "time travel", "aliens"] },
    { q: "Which state loves...", a:["cats", "dogs", "guns", "football"], d:["crying", "staring", "taxes", "aliens", "screaming", "dirt"] },
    { q: "Is New York...", a:["safe", "expensive", "sinking", "dirty"], d:["in canada", "a country", "made of cheese", "hollow", "floating", "loud"] }
];

let teams =[];
let currentTeamIdx = 0;
let currentQIdx = 0;
let strikes = 0;
let currentAnswers =[];
let revealedCount = 0;
let isCoop = false;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startGame(numTeams) {
    isCoop = numTeams === 1;
    teams = Array.from({length: numTeams}, (_, i) => ({ id: i+1, score: 0 }));
    shuffle(library);
    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    setupRound();
}

function setupRound() {
    let qData = library[currentQIdx];
    document.getElementById('question-text').textContent = qData.q + "...";
    document.getElementById('strikes-display').textContent = '';
    document.getElementById('next-round-btn').style.display = 'none';
    strikes = 0;
    revealedCount = 0;

    currentAnswers = qData.a.map((text, index) => ({
        text: text,
        points: (4 - index) * 1000,
        revealed: false
    }));

    const board = document.getElementById('board-container');
    board.innerHTML = '';
    currentAnswers.forEach((ans, idx) => {
        let row = document.createElement('div');
        row.className = 'board-row hidden-content';
        row.id = `row-${idx}`;
        row.innerHTML = `
            <div class="rank">${idx + 1}</div>
            <div class="ans-text">${ans.text}</div>
            <div class="ans-pts">${ans.points}</div>
        `;
        board.appendChild(row);
    });

    const choices = document.getElementById('choices-container');
    choices.innerHTML = '';
    let combinedChoices = shuffle([...qData.a, ...shuffle(qData.d).slice(0, 4)]);
    
    combinedChoices.forEach(choice => {
        let btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice;
        btn.onclick = () => processChoice(btn, choice);
        choices.appendChild(btn);
    });

    renderScores();
}

function renderScores() {
    const sb = document.getElementById('scoreboard');
    sb.innerHTML = '';
    
    if (isCoop) {
        let pill = document.createElement('div');
        pill.className = 'score-pill active-team';
        pill.textContent = `SCORE: ${teams[0].score}`;
        sb.appendChild(pill);
    } else {
        teams.forEach((t, i) => {
            let pill = document.createElement('div');
            pill.className = `score-pill ${i === currentTeamIdx ? 'active-team' : ''}`;
            pill.textContent = `TEAM ${t.id}: ${t.score}`;
            sb.appendChild(pill);
        });
    }
}

function processChoice(btn, choiceText) {
    let matchIdx = currentAnswers.findIndex(a => a.text === choiceText);

    if (matchIdx !== -1 && !currentAnswers[matchIdx].revealed) {
        currentAnswers[matchIdx].revealed = true;
        revealedCount++;
        btn.classList.add('correct');
        
        let row = document.getElementById(`row-${matchIdx}`);
        row.classList.remove('hidden-content');
        row.classList.add('revealed');
        
        teams[currentTeamIdx].score += currentAnswers[matchIdx].points;
        renderScores();

        if (revealedCount === 4) finishRound();
    } else {
        btn.classList.add('wrong');
        triggerStrike();
    }
}

function triggerStrike() {
    strikes++;
    document.getElementById('strikes-display').textContent = 'X '.repeat(strikes).trim();
    
    let overlay = document.getElementById('strike-screen');
    overlay.classList.remove('active');
    void overlay.offsetWidth; 
    overlay.classList.add('active');

    if (strikes >= 3) {
        setTimeout(finishRound, 800);
    } else if (!isCoop) {
        currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        renderScores();
    }
}

function finishRound() {
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    
    currentAnswers.forEach((ans, idx) => {
        if (!ans.revealed) {
            let row = document.getElementById(`row-${idx}`);
            row.classList.remove('hidden-content');
            row.classList.add('missed');
        }
    });
    
    document.getElementById('next-round-btn').style.display = 'block';
}

function nextRound() {
    currentQIdx++;
    if (currentQIdx >= library.length) {
        showGameOver();
    } else {
        if (!isCoop) currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        setupRound();
    }
}

function showGameOver() {
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('end-screen').classList.add('active');
    
    let standings = document.getElementById('final-standings');
    let sortedTeams = [...teams].sort((a, b) => b.score - a.score);
    
    sortedTeams.forEach((t, i) => {
        let row = document.createElement('div');
        row.className = `final-row ${i === 0 ? 'winner-row' : ''}`;
        if (isCoop) {
            row.innerHTML = `<span>Final Score:</span><span>${t.score} PTS</span>`;
        } else {
            row.innerHTML = `<span>Team ${t.id} ${i === 0 ? '👑' : ''}</span><span>${t.score}</span>`;
        }
        standings.appendChild(row);
    });
}
</script>
</body>
</html>
