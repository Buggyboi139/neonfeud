<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Feud</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="setup-screen" class="screen active glass">
    <div class="logo">
        <span class="text-glow">Neon</span>Feud
    </div>
    <h2>Select Game Mode</h2>
    <div class="team-setup">
        <button onclick="startGame(1)">1 Player (Co-op)</button>
        <button onclick="startGame(2)">2 Teams</button>
        <button onclick="startGame(3)">3 Teams</button>
        <button onclick="startGame(4)">4 Teams</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="top-bar glass">
        <div class="logo small">
            <span class="text-glow">Neon</span>Feud
        </div>
        <div id="scoreboard"></div>
        <div id="strikes-container"></div>
    </div>

    <div class="query-box glass">
        <span id="query-prefix"></span>
    </div>

    <div class="board-container glass">
        <ul id="answers-board"></ul>
    </div>

    <div class="choices-container glass">
        <div id="choices-grid"></div>
    </div>

    <div class="controls">
        <button id="next-round-btn" style="display: none;">Next Round</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
