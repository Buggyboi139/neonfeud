<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Orb Puzzle - Circular Swap</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #121212 0%, #1e1e2f 100%);
      color: #e0e0e0;
      overflow: hidden;
    }

    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .level-text {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      margin: 0;
    }

    .flavor-text {
      font-size: 1rem;
      color: #aaaaaa;
      margin-top: 5px;
    }

    .guess-display {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 5px;
      color: #3498db;
      height: 60px;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
      transition: color 0.3s ease;
    }

    .game-board {
      position: relative;
      width: 400px;
      height: 400px;
      background: #1a1a24;
      border-radius: 50%; /* Make the board circular to match the vibe */
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
      border: 1px solid #2a2a35;
    }

    #puzzleContainer {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transform-origin: center center;
    }

    #puzzleContainer.solved {
      animation: spinFade 1.2s ease-in-out forwards;
    }

    @keyframes spinFade {
      0% { transform: rotate(0deg) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.5); opacity: 0; }
    }

    #wireLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .start-marker {
      position: absolute;
      left: 50%;
      top: 25px;
      transform: translateX(-50%);
      color: #2ecc71;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 3;
      text-shadow: 0 0 5px rgba(46, 204, 113, 0.5);
    }

    .dot {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: #3498db;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.8), inset 0 -3px 0 rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      user-select: none;
      z-index: 2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .dot:hover {
      transform: scale(1.1);
    }

    .dot.selected {
      background-color: #e67e22; /* Orange highlight for the first clicked orb */
      box-shadow: 0 0 20px rgba(230, 126, 34, 0.9);
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="game-header">
    <h1 class="level-text" id="levelDisplay">Level 1</h1>
    <p class="flavor-text" id="flavorDisplay">Swap orbs to spell the word clockwise.</p>
  </div>

  <div class="guess-display" id="guessDisplay"></div> 

  <div class="game-board" id="gameBoard">
    <div class="start-marker" id="startMarker">Start ⬇</div>
    <div id="puzzleContainer">
      <svg id="wireLayer"></svg>
      <div id="orbLayer"></div>
    </div>
  </div>

  <script>
    let currentLevel = 1;
    const maxLevels = 4;
    let targetWord = "";
    let currentLetters = [];
    let orbs = [];
    let selectedIndex = null;
    let isAnimating = false;

    const wordBank = {
      1: ["SUN", "ART", "FOX", "JOY"],
      2: ["PLAY", "EPIC", "HERO", "STAR"],
      3: ["MAGIC", "LOGIC", "BRAIN", "POWER"],
      4: ["PUZZLE", "ACTION", "WIZARD", "GAMING"]
    };

    const puzzleContainer = document.getElementById('puzzleContainer');
    const wireLayer = document.getElementById('wireLayer');
    const orbLayer = document.getElementById('orbLayer');
    const levelDisplay = document.getElementById('levelDisplay');
    const flavorDisplay = document.getElementById('flavorDisplay');
    const guessDisplay = document.getElementById('guessDisplay');
    const startMarker = document.getElementById('startMarker');

    function startLevel(level) {
      isAnimating = false;
      selectedIndex = null;
      orbLayer.innerHTML = '';
      wireLayer.innerHTML = '';
      orbs = [];
      
      const wordOptions = wordBank[level];
      targetWord = wordOptions[Math.floor(Math.random() * wordOptions.length)];
      
      levelDisplay.textContent = `Level ${level}`;
      flavorDisplay.textContent = `Swap orbs to spell a ${targetWord.length}-letter word.`;

      // Scramble letters, ensuring it's not solved initially
      let scrambled;
      do {
        scrambled = targetWord.split('').sort(() => 0.5 - Math.random());
      } while (scrambled.join('') === targetWord);
      
      currentLetters = scrambled;

      const n = targetWord.length;
      const radius = 130; // Distance from center
      const centerX = 200;
      const centerY = 200;

      // Draw the static connecting wire (polygon)
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      let points = "";

      for (let i = 0; i < n; i++) {
        // Start angle at -90 degrees (12 o'clock position)
        const angle = (i * 2 * Math.PI) / n - (Math.PI / 2); 
        const cx = centerX + radius * Math.cos(angle);
        const cy = centerY + radius * Math.sin(angle);
        
        points += `${cx},${cy} `;

        const dot = document.createElement('div');
        dot.classList.add('dot');
        dot.style.left = `${cx - 25}px`; // Center the 50px dot
        dot.style.top = `${cy - 25}px`;
        
        dot.addEventListener('click', () => handleOrbClick(i));
        
        orbLayer.appendChild(dot);
        orbs.push(dot);
      }

      polygon.setAttribute('points', points.trim());
      polygon.setAttribute('fill', 'none');
      polygon.setAttribute('stroke', '#3498db');
      polygon.setAttribute('stroke-width', '4');
      polygon.setAttribute('stroke-linejoin', 'round');
      
      wireLayer.appendChild(polygon);

      renderOrbs();
    }

    function handleOrbClick(index) {
      if (isAnimating) return; // Prevent clicking during win animation

      if (selectedIndex === null) {
        // Select first orb
        selectedIndex = index;
      } else if (selectedIndex === index) {
        // Deselect if clicking the same orb
        selectedIndex = null;
      } else {
        // Swap letters
        const temp = currentLetters[selectedIndex];
        currentLetters[selectedIndex] = currentLetters[index];
        currentLetters[index] = temp;
        selectedIndex = null; // Reset selection after swap
        
        renderOrbs();
        checkWinCondition();
        return;
      }
      
      renderOrbs();
    }

    function renderOrbs() {
      orbs.forEach((dot, i) => {
        dot.textContent = currentLetters[i];
        
        if (i === selectedIndex) {
          dot.classList.add('selected');
        } else {
          dot.classList.remove('selected');
        }
      });
      
      // Show current spelling clockwise from the top
      guessDisplay.textContent = currentLetters.join('');
    }

    function checkWinCondition() {
      if (currentLetters.join('') === targetWord) {
        isAnimating = true;
        
        // Visual success cues
        guessDisplay.style.color = "#2ecc71";
        const polygon = wireLayer.querySelector('polygon');
        if (polygon) polygon.setAttribute('stroke', '#2ecc71');
        
        orbs.forEach(dot => {
          dot.style.backgroundColor = "#2ecc71";
          dot.style.boxShadow = "0 0 20px rgba(46, 204, 113, 0.9)";
        });

        puzzleContainer.classList.add('solved');

        setTimeout(() => {
          // Reset UI
          puzzleContainer.classList.remove('solved');
          guessDisplay.style.color = "#3498db";
          
          if (currentLevel < maxLevels) {
            currentLevel++;
            startLevel(currentLevel);
          } else {
            levelDisplay.textContent = "You Win!";
            flavorDisplay.textContent = "You are a word master.";
            guessDisplay.textContent = "🎉🎉🎉";
            orbLayer.innerHTML = '';
            wireLayer.innerHTML = '';
            startMarker.style.display = 'none';
          }
        }, 1200); // Matches CSS animation duration
      }
    }

    // Initialize game
    startLevel(currentLevel);
  </script>
</body>
</html>
