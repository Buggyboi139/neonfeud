<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untangle The Wires</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --text-color: #ffffff;
            --accent-glow: #00f3ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #0f0f13 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #888;
        }

        canvas {
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.05);
            border-radius: 12px;
            background: rgba(25, 25, 35, 0.4);
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        #win-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 60px;
            border-radius: 16px;
            border: 1px solid var(--accent-glow);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        #win-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #win-screen h2 {
            margin: 0 0 20px 0;
            color: var(--accent-glow);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        button {
            background: transparent;
            color: var(--accent-glow);
            border: 1px solid var(--accent-glow);
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--accent-glow);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>UNTANGLE</h1>
        <p>Drag the dots so no wires cross.</p>
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div id="win-screen">
        <h2>System Restored</h2>
        <p style="color: #fff; margin-bottom: 20px;">Puzzle Solved Successfully.</p>
        <button onclick="resetLevel()">Restart Level</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const winScreen = document.getElementById('win-screen');

        // Game Configuration
        const DOT_RADIUS = 12;
        const GLOW_RADIUS = 20;
        let isDragging = false;
        let draggedNode = null;
        let gameWon = false;

        // Level Data (Positions and Connections)
        let nodes = [];
        const edges = [
            [0, 2], [0, 3], [0, 4], [0, 5],
            [1, 3], [1, 4], [1, 5], [1, 6],
            [2, 4], [2, 5], [2, 6],
            [3, 6]
        ];

        // Initialize tangled layout
        function resetLevel() {
            gameWon = false;
            winScreen.classList.remove('visible');
            
            // Deliberately tangled starting positions
            nodes = [
                { x: 150, y: 150 }, { x: 450, y: 150 },
                { x: 300, y: 250 }, { x: 150, y: 450 },
                { x: 450, y: 450 }, { x: 300, y: 350 },
                { x: 300, y: 100 }
            ];
            
            draw();
        }

        // Math: Check if two line segments intersect
        function ccw(A, B, C) {
            return (C.y - A.y) * (B.x - A.x) > (B.y - A.y) * (C.x - A.x);
        }

        function linesIntersect(p1, p2, p3, p4) {
            return (ccw(p1, p3, p4) !== ccw(p2, p3, p4)) && (ccw(p1, p2, p3) !== ccw(p1, p2, p4));
        }

        function checkIntersections() {
            let intersectingEdges = new Set();
            let totalIntersections = 0;

            for (let i = 0; i < edges.length; i++) {
                for (let j = i + 1; j < edges.length; j++) {
                    const e1 = edges[i];
                    const e2 = edges[j];

                    // If they share a node, they don't "cross" in a planar graph sense
                    if (e1[0] === e2[0] || e1[0] === e2[1] || e1[1] === e2[0] || e1[1] === e2[1]) {
                        continue;
                    }

                    const p1 = nodes[e1[0]];
                    const p2 = nodes[e1[1]];
                    const p3 = nodes[e2[0]];
                    const p4 = nodes[e2[1]];

                    if (linesIntersect(p1, p2, p3, p4)) {
                        intersectingEdges.add(i);
                        intersectingEdges.add(j);
                        totalIntersections++;
                    }
                }
            }
            return { intersectingEdges, totalIntersections };
        }

        // Rendering logic
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const { intersectingEdges, totalIntersections } = checkIntersections();

            // Draw Wires
            ctx.lineWidth = 3;
            edges.forEach((edge, index) => {
                const n1 = nodes[edge[0]];
                const n2 = nodes[edge[1]];
                const isTangled = intersectingEdges.has(index);

                ctx.beginPath();
                ctx.moveTo(n1.x, n1.y);
                ctx.lineTo(n2.x, n2.y);

                if (isTangled) {
                    ctx.strokeStyle = '#ff3366'; // Red for tangled
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff3366';
                } else {
                    ctx.strokeStyle = '#00f3ff'; // Cyan for untangled
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#00f3ff';
                }
                
                // Dim the overall brightness if game is won
                if(gameWon) {
                    ctx.strokeStyle = '#00f3ff';
                    ctx.shadowBlur = 15;
                }

                ctx.stroke();
            });

            // Draw Dots
            nodes.forEach((node, index) => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, DOT_RADIUS, 0, Math.PI * 2);
                
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = GLOW_RADIUS;
                ctx.shadowColor = gameWon ? '#00f3ff' : '#ffffff';
                
                // Highlight grabbed node
                if (draggedNode === index) {
                    ctx.fillStyle = '#00f3ff';
                    ctx.shadowBlur = 30;
                }

                ctx.fill();
            });

            // Reset shadow for next frame
            ctx.shadowBlur = 0;

            // Win Condition
            if (totalIntersections === 0 && !isDragging && !gameWon) {
                gameWon = true;
                setTimeout(() => {
                    winScreen.classList.add('visible');
                }, 300); // Slight delay for satisfaction
                draw(); // Redraw once more for the "won" glow state
            }
        }

        // Mouse/Touch Interaction
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handlePointerDown(e) {
            if (gameWon) return;
            e.preventDefault();
            const pos = getMousePos(e);
            
            // Find if a node was clicked (reverse order to grab top-most if overlapping)
            for (let i = nodes.length - 1; i >= 0; i--) {
                const dx = pos.x - nodes[i].x;
                const dy = pos.y - nodes[i].y;
                if (Math.sqrt(dx * dx + dy * dy) < DOT_RADIUS * 2) { // Generous hit area
                    isDragging = true;
                    draggedNode = i;
                    break;
                }
            }
            draw();
        }

        function handlePointerMove(e) {
            if (isDragging && draggedNode !== null) {
                e.preventDefault();
                const pos = getMousePos(e);
                
                // Constrain to canvas bounds with padding
                nodes[draggedNode].x = Math.max(DOT_RADIUS, Math.min(canvas.width - DOT_RADIUS, pos.x));
                nodes[draggedNode].y = Math.max(DOT_RADIUS, Math.min(canvas.height - DOT_RADIUS, pos.y));
                
                draw();
            }
        }

        function handlePointerUp() {
            isDragging = false;
            draggedNode = null;
            draw();
        }

        // Event Listeners (Mouse & Touch)
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
        canvas.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

        // Start Game
        resetLevel();
    </script>
</body>
</html>
