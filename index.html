<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Feud</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="setup-screen" class="screen active glass-panel">
    <div class="logo">
        <span class="g-blue">G</span><span class="g-red">l</span><span class="g-yellow">a</span><span class="g-blue">s</span><span class="g-green">s</span><span class="g-red">F</span><span class="g-blue">e</span><span class="g-red">u</span><span class="g-yellow">d</span>
    </div>
    <h2>Select Game Mode</h2>
    <div class="team-setup">
        <button onclick="startGame(1)">1 Player (Co-op)</button>
        <button onclick="startGame(2)">2 Teams</button>
        <button onclick="startGame(3)">3 Teams</button>
        <button onclick="startGame(4)">4 Teams</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="header-container glass-panel">
        <div class="logo small">
            <span class="g-blue">G</span><span class="g-red">l</span><span class="g-yellow">a</span><span class="g-blue">s</span><span class="g-green">s</span><span class="g-red">F</span><span class="g-blue">e</span><span class="g-red">u</span><span class="g-yellow">d</span>
        </div>
        <div id="scoreboard"></div>
        <div id="strikes-container"></div>
    </div>

    <div class="search-box glass-panel">
        <span id="query-prefix"></span>
    </div>

    <div class="board-container glass-panel">
        <ul id="answers-board"></ul>
    </div>

    <div class="choices-container glass-panel">
        <div id="choices-grid"></div>
    </div>

    <div class="controls">
        <button id="next-round-btn" class="glass-button" style="display: none;">Next Round</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
